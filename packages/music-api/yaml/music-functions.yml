# Lambdorna ärver MAIN_TABLE från provider.environment i ../serverless.yml (HrkMainTable-${stage}).
# IAM: serverless-iam-roles-per-function ger varje funktion en egen roll med iamRoleStatements nedan.

getPlaylists:
  handler: functions/playlists/getPlaylists.handler
  name: hrk-get-playlists-${sls:stage}
  description: Lists all playlists for the authenticated user.
  events:
    - httpApi:
        method: GET
        path: /playlists
        authorizer:
          name: centralJwtAuthorizer
  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - "dynamodb:GetItem"
        - "dynamodb:PutItem"
        - "dynamodb:UpdateItem"
        - "dynamodb:Query"
        - "dynamodb:DeleteItem"
      Resource:
        - "arn:aws:dynamodb:${self:provider.region}:${aws:accountId}:table/${self:custom.mainTableName}"
        - "arn:aws:dynamodb:${self:provider.region}:${aws:accountId}:table/${self:custom.mainTableName}/index/*"

createPlaylist:
  handler: functions/playlists/createPlaylist.handler
  name: hrk-create-playlist-${sls:stage}
  description: Creates a new personal playlist (metadata only).
  events:
    - httpApi:
        method: POST
        path: /playlists
        authorizer:
          name: centralJwtAuthorizer
  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - "dynamodb:GetItem"
        - "dynamodb:PutItem"
        - "dynamodb:UpdateItem"
        - "dynamodb:Query"
        - "dynamodb:DeleteItem"
      Resource:
        - "arn:aws:dynamodb:${self:provider.region}:${aws:accountId}:table/${self:custom.mainTableName}"
        - "arn:aws:dynamodb:${self:provider.region}:${aws:accountId}:table/${self:custom.mainTableName}/index/*"

updatePlaylist:
